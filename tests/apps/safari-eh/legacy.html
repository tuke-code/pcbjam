<!doctype html>
<meta charset="utf-8">
<title>safari native wasm-EH repro: legacy encoding</title>
<pre id="out">loading…</pre>
<script>
  // Capture any hard failure (the Safari #25365 crash shows up as an instantiation error / pageerror).
  window.__ehResult = null; window.__ehError = null;
  addEventListener('error', e => { if (!window.__ehError) window.__ehError = 'error: ' + (e.message || e.type); });
  addEventListener('unhandledrejection', e => { if (!window.__ehError) window.__ehError = 'rejection: ' + ((e.reason && e.reason.message) || e.reason); });
</script>
<script src="repro-legacy.js"></script>
<script>
  // main() runs inside createRepro() and sets window.__ehResult = "EH_OK code=42".
  createRepro()
    .then(() => { document.getElementById('out').textContent = 'OK: ' + window.__ehResult; })
    .catch(e => { window.__ehError = window.__ehError || ('instantiate: ' + ((e && e.message) || e)); document.getElementById('out').textContent = 'FAIL: ' + window.__ehError; });
</script>
